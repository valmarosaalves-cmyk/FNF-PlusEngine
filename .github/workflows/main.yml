# ╔════════════════════════════════════════════════════════════════════╗
# ║              FNF PlusEngine - Multi-Platform Builder              ║
# ╚════════════════════════════════════════════════════════════════════╝
#
# 📦 Trigger builds by including keywords in your commit message
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ 🪟 WINDOWS BUILDS                                               │
# ├─────────────────────────────────────────────────────────────────┤
# │  ├── 'winall' or 'win'    → Build both 32-bit and 64-bit       │
# │  ├── 'winx86' or 'win32'  → Build 32-bit only                  │
# │  └── 'winx64' or 'win64'  → Build 64-bit only                  │
# └─────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ 🍎 MAC BUILDS                                                   │
# ├─────────────────────────────────────────────────────────────────┤
# │  ├── 'macall' or 'mac'       → Build Intel and ARM             │
# │  ├── 'macin' or 'macintel'   → Build Intel only                │
# │  └── 'macar' or 'macarm'     → Build ARM (Apple Silicon) only  │
# └─────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ 🐧📱 LINUX & MOBILE BUILDS                                      │
# ├─────────────────────────────────────────────────────────────────┤
# │  ├── 'linx' or 'linux'    → Build Linux 64-bit                 │
# │  ├── 'andr' or 'android'  → Build Android APK                  │
# │  └── 'ios'                → Build iOS (unsigned)               │
# └─────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────┐
# │ 🌍 ALL PLATFORMS                                                │
# ├─────────────────────────────────────────────────────────────────┤
# │  └── 'all'  → Build everything (Win32, Win64, Mac Intel,       │
# │               Mac ARM, Linux, Android, iOS)                     │
# └─────────────────────────────────────────────────────────────────┘

name: Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  # ╔═══════════════════════════════════════════════════════════════════╗
  # ║                        🪟 WINDOWS BUILDS                          ║
  # ╚═══════════════════════════════════════════════════════════════════╝
  
  # ├── Windows 32-bit (x86)
  Windows-x86:
    if: contains(github.event.head_commit.message, 'winx86') || contains(github.event.head_commit.message, 'win32') || contains(github.event.head_commit.message, 'winall') || contains(github.event.head_commit.message, 'win') || contains(github.event.head_commit.message, 'all')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib
        run: |
          haxelib setup C:/haxelib
          haxelib install hxcpp > $null
          .\setup\windows-lib.bat
        shell: cmd
      
      - name: Skip SScript setup mode
        run: |
          echo oy9:showMacroty8:loopCosti25y10:includeAllfg > %USERPROFILE%\settings.cocoa
          type %USERPROFILE%\settings.cocoa
        shell: cmd
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Compile
        run: haxelib run lime build windows -32 -D 32bits --app-version="4.0.0-${{ github.run_id}}" -D officialBuild
        continue-on-error: true
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: windowsBuild32
          path: export/release/windows/bin/*
  
  # └── Windows 64-bit (x64)
  Windows-x64:
    if: contains(github.event.head_commit.message, 'winx64') || contains(github.event.head_commit.message, 'win64') || contains(github.event.head_commit.message, 'winall') || contains(github.event.head_commit.message, 'win') || contains(github.event.head_commit.message, 'all')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib
        run: |
          haxelib setup C:/haxelib
          haxelib install hxcpp > $null
          .\setup\windows-lib.bat
        shell: cmd
      
      - name: Skip SScript setup mode
        run: |
          echo oy9:showMacroty8:loopCosti25y10:includeAllfg > %USERPROFILE%\settings.cocoa
          type %USERPROFILE%\settings.cocoa
        shell: cmd
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Compile
        run: haxelib run lime build windows -32 -D 32bits --app-version="4.0.0-${{ github.run_id}}" -D officialBuild
        continue-on-error: true
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: windowsBuild64
          path: export/release/windows/bin/*

  # ╔═══════════════════════════════════════════════════════════════════╗
  # ║                          🍎 MAC BUILDS                            ║
  # ╚═══════════════════════════════════════════════════════════════════╝
  
  # ├── Mac Intel (x64)
  Mac-Intel:
    if: contains(github.event.head_commit.message, 'macin') || contains(github.event.head_commit.message, 'macintel') || contains(github.event.head_commit.message, 'macall') || contains(github.event.head_commit.message, 'mac') || contains(github.event.head_commit.message, 'all')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Skip SScript setup mode
        run: |
          echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
          cat ~/settings.cocoa
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Compile
        run: haxelib run lime build mac -64 --app-version="4.0.0-${{ github.run_id}}" -D officialBuild
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: macBuildIntel
          path: export/release/macos/bin/*

  # └── Mac ARM (Apple Silicon)
  Mac-ARM:
    if: contains(github.event.head_commit.message, 'macar') || contains(github.event.head_commit.message, 'macarm') || contains(github.event.head_commit.message, 'macall') || contains(github.event.head_commit.message, 'mac') || contains(github.event.head_commit.message, 'all')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Skip SScript setup mode
        run: |
          echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
          cat ~/settings.cocoa
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Compile
        run: haxelib run lime build linux -64bits --app-version="4.0.0-${{ github.run_id}}" -D officialBuild
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: macBuildARM
          path: export/release/macos/bin/*

  # ╔═══════════════════════════════════════════════════════════════════╗
  # ║                    🐧📱 LINUX & MOBILE BUILDS                     ║
  # ╚═══════════════════════════════════════════════════════════════════╝
  
  # ├── Linux 64-bit
  Linux-x64:
    if: contains(github.event.head_commit.message, 'linx') || contains(github.event.head_commit.message, 'linux') || contains(github.event.head_commit.message, 'all')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib
        run: |
          sudo apt-get update
          sudo apt-get install libvlc-dev libvlccore-dev libasound2-dev libpulse-dev \
            libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null --quiet
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Skip SScript setup mode
        run: |
          echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
          cat ~/settings.cocoa
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Compile
        run: haxelib run lime build linux -64bits --app-version="4.0.0-${{ github.run_id}}" -D officialBuild
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: linuxBuild64
          path: export/release/linux/bin/*

  # ├── Android (APK)
  Android:
    if: contains(github.event.head_commit.message, 'andr') || contains(github.event.head_commit.message, 'android') || contains(github.event.head_commit.message, 'all')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Android SDK 35 and NDK r27d
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973" "cmdline-tools;latest"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
      
      - name: Install Haxelib
        run: |
          sudo apt-get update
          sudo apt-get install libasound2-dev
          sudo apt-get install libpulse-dev
          sudo apt-get install libx11-dev libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
          sudo apt-get install libgl1-mesa-dev libglu1-mesa-dev
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null --quiet
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Setup Lime for Android
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_SDK_ROOT/ndk/27.0.12077973
          haxelib run lime config JAVA_HOME $JAVA_HOME
      
      - name: Fix Lime StorageProvider icon bug
        run: |
          LIME_PATH=$(haxelib path lime | head -n 1)
          STORAGE_FILE="${LIME_PATH}templates/android/template/app/src/main/java/org/haxe/lime/StorageProvider.java"
          if [ -f "$STORAGE_FILE" ]; then
            sed -i 's/R\.drawable\.icon/0/g' "$STORAGE_FILE"
            echo "Fixed StorageProvider.java icon references"
          else
            echo "StorageProvider.java not found at $STORAGE_FILE"
          fi
      
      - name: Skip SScript setup mode
        run: |
          echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
          cat ~/settings.cocoa
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Clean old build artifacts only
        run: |
          rm -rf export
          rm -rf build
          rm -rf ~/.gradle
      
      - name: Configure Gradle memory settings
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=true" >> ~/.gradle/gradle.properties
          echo "android.enableR8.fullMode=false" >> ~/.gradle/gradle.properties
      
      - name: Compile
        run: |
          haxelib run lime build android --app-version="4.0.0-${{ github.run_id}}" -D officialBuild -D HXCPP_IGNORE_WARNINGS
        continue-on-error: true
      
      - name: Find and move APK file to directory
        run: |
          find export/release/android -name "*.apk" -type f | head -5
          
          mkdir -p android-artifact
          
          for apk in export/release/android/bin/*.apk; do
            if [ -f "$apk" ]; then
              echo "Found APK: $apk"
              cp "$apk" android-artifact/
            fi
          done
          
          if [ ! "$(ls -A android-artifact 2>/dev/null)" ]; then
            echo "Searching for APK files in export directory..."
            find export -name "*.apk" -type f -exec cp {} android-artifact/ \;
          fi
          
          echo "Artifact to upload:"
          ls -la android-artifact/
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: androidBuild
          path: android-artifact/*

  # └── iOS (Unsigned)
  iOS:
    if: contains(github.event.head_commit.message, 'ios') || contains(github.event.head_commit.message, 'all')
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4.1.7

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4
      
      - name: Install Haxelib
        run: |
          haxelib setup ~/haxelib
          chmod +x ./setup/unish-lib.sh
          sh ./setup/unish-lib.sh
      
      - name: Skip SScript setup mode
        run: |
          echo -n 'oy9:showMacroty8:loopCosti25y10:includeAllfg' > ~/settings.cocoa
          cat ~/settings.cocoa
      
      - name: Create Version Tag
        run: echo "${{github.run_id}}" > VERSION
      
      - name: Compile
        run: haxelib run lime build ios -nosign --app-version="4.0.0-${{ github.run_id}}" -D officialBuild
      
      - name: Publish Artifact
        uses: actions/upload-artifact@v4.3.4
        with:
          name: iOSBuild
          path: export/release/ios/build/Release-iphoneos/*
